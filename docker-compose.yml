# MEA Analysis — docker-compose.yml
#
# Usage:
#   1. Build the image:
#        docker compose build
#
#   2. Run the pipeline against your data directory:
#        DATA_DIR=/path/to/your/data docker compose run --rm mea-analysis
#
#   3. Drop into an interactive shell:
#        docker compose run --rm mea-analysis bash
#
#   4. Pass custom pipeline arguments:
#        docker compose run --rm mea-analysis \
#          python3 IPNAnalysis/run_pipeline_driver.py /data --sorter kilosort4 --output-dir /data/results
#
# Requirements:
#   - NVIDIA GPU with CUDA 12.x drivers
#   - NVIDIA Container Toolkit (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html)

services:
  mea-analysis:
    build:
      context: .
      dockerfile: dockers/spikesorter/Dockerfile
    image: mea-analysis:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      # Mount your data directory here.
      # Override DATA_DIR: DATA_DIR=/path/to/data docker compose run --rm mea-analysis
      - ${DATA_DIR:-./data}:/data
    stdin_open: true
    tty: true
